<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        :root {
            --primary: #0d6efd;
            --success: #198754;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #0dcaf0;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .header p {
            margin: 0;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: #ffffff;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: rgba(0, 0, 0, 0.2);
            border: none;
            border-bottom: 2px solid var(--primary);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.3rem;
            margin: 0;
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .metric-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .metric-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }

        .progress {
            background: rgba(0, 0, 0, 0.3);
            height: 25px;
            border-radius: 10px;
        }

        .progress-bar {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .cpu-cores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .core-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border-left: 3px solid #0dcaf0;
        }

        .core-label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .core-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0dcaf0;
            margin: 5px 0;
        }

        .process-table {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .process-table thead {
            background: rgba(0, 0, 0, 0.3);
        }

        .process-table td {
            border-color: rgba(255, 255, 255, 0.1);
            padding: 12px;
        }

        .process-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-good { background: #28a745; }
        .status-warning { background: #ffc107; }
        .status-danger { background: #dc3545; }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid var(--info);
        }

        .detail-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--info);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .metric-value {
                font-size: 1.8rem;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ System Monitor</h1>
        <p id="update-time">Last updated: --:--:--</p>
    </div>

    <div class="container-fluid">
        <!-- Charts -->
        <div class="charts-container">
            <div class="chart-card">
                <canvas id="cpuChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="ramChart"></canvas>
            </div>
        </div>

        <!-- Main Metrics Row -->
        <div class="row">
            <!-- CPU Card -->
            <div class="col-lg-4 col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">CPU</h5>
                    </div>
                    <div class="card-body">
                        <div class="metric-box">
                            <div class="metric-label">Overall Usage</div>
                            <div class="metric-value" id="cpu">0%</div>
                            <div class="progress" style="margin-top: 10px;">
                                <div class="progress-bar bg-info" id="cpu-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">Frequency</div>
                            <div class="metric-value" id="cpu-freq">0 GHz</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">Cores</div>
                            <div class="metric-value" id="cpu-cores">0</div>
                        </div>
                        <div class="cpu-cores-grid" id="cpu-cores-container"></div>
                    </div>
                </div>
            </div>

            <!-- RAM Card -->
            <div class="col-lg-4 col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Memory (RAM)</h5>
                    </div>
                    <div class="card-body">
                        <div class="metric-box">
                            <div class="metric-label">Usage</div>
                            <div class="metric-value" id="ram">0%</div>
                            <div class="progress" style="margin-top: 10px;">
                                <div class="progress-bar bg-warning" id="ram-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">Used</div>
                                <div class="detail-value" id="ram-used">0 GB</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Available</div>
                                <div class="detail-value" id="ram-available">0 GB</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Total</div>
                                <div class="detail-value" id="ram-total">0 GB</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Disk Card -->
            <div class="col-lg-4 col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Storage</h5>
                    </div>
                    <div class="card-body">
                        <div class="metric-box">
                            <div class="metric-label">Usage</div>
                            <div class="metric-value" id="disk">0%</div>
                            <div class="progress" style="margin-top: 10px;">
                                <div class="progress-bar bg-danger" id="disk-progress" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">Used</div>
                                <div class="detail-value" id="disk-used">0 GB</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Free</div>
                                <div class="detail-value" id="disk-free">0 GB</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Total</div>
                                <div class="detail-value" id="disk-total">0 GB</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Network Card -->
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Network</h5>
                    </div>
                    <div class="card-body">
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="detail-label">📤 Data Sent</div>
                                <div class="detail-value" id="net-sent">0 GB</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">📥 Data Received</div>
                                <div class="detail-value" id="net-recv">0 GB</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Top Processes Card -->
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Top Processes</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-dark process-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50%;">Process Name</th>
                                        <th style="width: 25%;text-align: right;">CPU %</th>
                                        <th style="width: 25%;text-align: right;">Memory %</th>
                                    </tr>
                                </thead>
                                <tbody id="processes-list">
                                    <tr><td colspan="3" class="text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cpuChart, ramChart;

        function initCharts() {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.7)',
                            callback: function(value) {
                                return value + '%';
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    x: {
                        ticks: {
                            color: 'rgba(255, 255, 255, 0.7)'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    }
                }
            };

            cpuChart = new Chart(document.getElementById('cpuChart'), {
                type: 'line',
                data: {
                    labels: Array.from({length: 60}, (_, i) => i),
                    datasets: [{
                        label: 'CPU Usage',
                        data: Array(60).fill(0),
                        borderColor: '#0dcaf0',
                        backgroundColor: 'rgba(13, 202, 240, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 0
                    }]
                },
                options: chartOptions
            });

            ramChart = new Chart(document.getElementById('ramChart'), {
                type: 'line',
                data: {
                    labels: Array.from({length: 60}, (_, i) => i),
                    datasets: [{
                        label: 'RAM Usage',
                        data: Array(60).fill(0),
                        borderColor: '#ffc107',
                        backgroundColor: 'rgba(255, 193, 7, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 0
                    }]
                },
                options: chartOptions
            });
        }

        function updateMetrics(data) {
            // Update time
            const now = new Date();
            document.getElementById('update-time').textContent = 
                'Last updated: ' + now.toLocaleTimeString();

            // CPU
            document.getElementById('cpu').textContent = data.cpu + '%';
            document.getElementById('cpu-progress').style.width = data.cpu + '%';
            document.getElementById('cpu-freq').textContent = data.cpu_freq + ' GHz';
            document.getElementById('cpu-cores').textContent = data.cpu_cores;

            // CPU Cores
            const coresContainer = document.getElementById('cpu-cores-container');
            coresContainer.innerHTML = data.cpu_per_core.map((core, i) => `
                <div class="core-box">
                    <div class="core-label">Core ${i}</div>
                    <div class="core-value">${core}%</div>
                </div>
            `).join('');

            // RAM
            document.getElementById('ram').textContent = data.ram + '%';
            document.getElementById('ram-progress').style.width = data.ram + '%';
            document.getElementById('ram-used').textContent = data.ram_used + ' GB';
            document.getElementById('ram-available').textContent = data.ram_available + ' GB';
            document.getElementById('ram-total').textContent = data.ram_total + ' GB';

            // Disk
            document.getElementById('disk').textContent = data.disk + '%';
            document.getElementById('disk-progress').style.width = data.disk + '%';
            document.getElementById('disk-used').textContent = data.disk_used + ' GB';
            document.getElementById('disk-free').textContent = data.disk_free + ' GB';
            document.getElementById('disk-total').textContent = data.disk_total + ' GB';

            // Network
            document.getElementById('net-sent').textContent = data.net_sent + ' GB';
            document.getElementById('net-recv').textContent = data.net_recv + ' GB';

            // Update charts
            cpuChart.data.datasets[0].data = data.history.cpu;
            cpuChart.update('none');
            ramChart.data.datasets[0].data = data.history.ram;
            ramChart.update('none');

            // Top processes
            const processesList = document.getElementById('processes-list');
            if (data.top_processes.length > 0) {
                processesList.innerHTML = data.top_processes.map(proc => `
                    <tr>
                        <td>${proc.name}</td>
                        <td style="text-align: right;">${proc.cpu}%</td>
                        <td style="text-align: right;">${proc.memory}%</td>
                    </tr>
                `).join('');
            } else {
                processesList.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No process data available</td></tr>';
            }
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', () => {
            initCharts();
            const source = new EventSource("/metrics");

            source.onmessage = function(event) {
                const data = JSON.parse(event.data);
                updateMetrics(data);
            };

            source.onerror = function(event) {
                console.error('SSE error:', event);
            };
        });
    </script>
</body>
</html>
